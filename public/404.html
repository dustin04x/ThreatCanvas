<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Handle SPA routing on GitHub Pages
      // Store the path and redirect to root
      const path = window.location.pathname.replace(/^\/ThreatCanvas/, '');
      sessionStorage.redirect = path;
      // Redirect to the root with preserved path
      window.location.href = '/ThreatCanvas/';
    </script>
  </head>
  <body></body>
</html>
